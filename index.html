<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaccination Guide RK</title>
    <style>
        /* Современный дизайн */
        :root { --blue: #007aff; --bg: #f2f2f7; --card: #ffffff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #1c1c1e; }
        .container { max-width: 500px; margin: 0 auto; }
        .lang-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        button { border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .btn-blue { background: var(--blue); color: white; width: 100%; margin-top: 15px; }
        .btn-lang { background: #e5e5ea; color: #3a3a3c; }
        .btn-lang.active { background: var(--blue); color: white; }
        .card { background: var(--card); padding: 24px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: center; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; border: 1px solid #d1d1d6; border-radius: 10px; box-sizing: border-box; font-size: 16px; margin-top: 10px; }
        .res-item { background: #f9f9fb; padding: 15px; border-radius: 12px; margin-top: 10px; text-align: left; border-left: 4px solid var(--blue); }
        .myth-text { font-style: italic; color: #8e8e93; margin-top: 10px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-nav">
        <button onclick="setL('kz')" id="l-kz" class="btn-lang">ҚАЗ</button>
        <button onclick="setL('ru')" id="l-ru" class="btn-lang active">РУС</button>
    </div>

    <h1 id="t" style="text-align: center;">Защитите будущее ребенка</h1>
    
    <div class="card">
        <h2 id="ch">Калькулятор прививок</h2>
        <input type="date" id="d_val">
        <button onclick="calc()" class="btn-blue" id="cb">Рассчитать график</button>
        <div id="res"></div>
    </div>

    <div class="card">
        <h2 id="mh">Мифы и Реальность</h2>
        <div id="m-res" class="myth-text"></div>
    </div>
</div>

<script>
    const content = {
        ru: {
            t: "Защитите будущее ребенка", ch: "Калькулятор прививок", cb: "Рассчитать график", mh: "Мифы и Реальность",
            v: ["БЦЖ и ВГВ (0-4 дня)", "АбКДС, ИПВ, Хиб, ВГВ (2 месяца)", "Пневмококковая вакцина (2 месяца)"],
            m: "Миф: Вакцины вызывают аутизм. Шындық: Это научно опровергнутая ложь. Исследования подтвердили безопасность."
        },
        kz: {
            t: "Балаңыздың болашағын қорғаңыз", ch: "Екпе калькуляторы", cb: "Есептеу", mh: "Миф пен Шындық",
            v: ["БЦЖ және ВГВ (0-4 күн)", "АбКДС кешені (2 ай)", "Пневмококк екпесі (2 ай)"],
            m: "Миф: Вакцина аутизм тудырады. Шындық: Бұл жалған. Көптеген зерттеулер оның қауіпсіздігін дәлелдеді."
        }
    };

    let cur = 'ru';

    function setL(l) {
        cur = l;
        document.getElementById('t').innerText = content[l].t;
        document.getElementById('ch').innerText = content[l].ch;
        document.getElementById('cb').innerText = content[l].cb;
        document.getElementById('mh').innerText = content[l].mh;
        
        document.querySelectorAll('.btn-lang').forEach(b => b.classList.remove('active'));
        document.getElementById('l-' + l).classList.add('active');
        
        document.getElementById('res').innerHTML = "";
        renderM();
    }

    function renderM() {
        document.getElementById('m-res').innerText = content[cur].m;
    }

    function calc() {
        let html = "<div style='margin-top:20px; font-weight:bold;'>Рекомендуемые прививки:</div>";
        content[cur].v.forEach(vac => {
            html += <div class="res-item">${vac}</div>;
        });
        document.getElementById('res').innerHTML = html;
    }

    window.onload = renderM;
</script>

</body>
</html>
